<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplyMan - Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="logo_rm.png">
</head>
<body>
    <div class="auth-container">
        <!-- Auth Card (Login/Register) -->
        <div class="auth-card" id="authCard">
            <div class="auth-logo">
                <div class="logo-icon"><img src="logo_rm.png" alt="ReplyMan"></div>
                <h1>ReplyMan</h1>
                <p>ИИ-ассистент для вашего бизнеса</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" class="form-input" placeholder="Введите пароль" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Войти</span>
                    <span>→</span>
                </button>
            </form>
            
            <!-- Register Form (hidden by default) -->
            <form id="registerForm" class="auth-form hidden">
                <div class="form-group">
                    <label class="form-label" for="registerName">Имя</label>
                    <input type="text" id="registerName" class="form-input" placeholder="Ваше имя">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" class="form-input" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="registerPassword">Пароль</label>
                    <input type="password" id="registerPassword" class="form-input" placeholder="Минимум 8 символов" required minlength="8">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="registerPasswordConfirm">Подтвердите пароль</label>
                    <input type="password" id="registerPasswordConfirm" class="form-input" placeholder="Повторите пароль" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Зарегистрироваться</span>
                    <span>→</span>
                </button>
            </form>
            
            <div class="auth-footer">
                <p id="authSwitch">
                    Нет аккаунта? <a href="#" id="showRegister">Зарегистрироваться</a>
                </p>
            </div>
        </div>

        <!-- Email Verification Card -->
        <div class="auth-card verification-card" id="verificationCard" style="display: none;">
            <div class="auth-logo">
                <div class="logo-icon"><img src="logo_rm.png" alt="ReplyMan"></div>
                <h1>ReplyMan</h1>
                <p class="verification-subtitle">Подтверждение email</p>
            </div>
            
            <div id="verificationAlert"></div>
            
            <div class="verification-info">
                <div class="verification-icon-circle">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </div>
                <p class="verification-message">
                    Мы отправили письмо на адрес
                </p>
                <p class="verification-email" id="verificationEmail"></p>
                <p class="verification-hint">
                    Перейдите по ссылке из письма. Если письма нет — проверьте папку «Спам».
                </p>
            </div>
            
            <div class="verification-actions">
                <button id="checkVerificationBtn" class="btn btn-primary" style="width: 100%;">
                    Я подтвердил почту
                </button>
                <button id="resendVerificationBtn" class="btn btn-outline" style="width: 100%;">
                    Отправить письмо повторно
                </button>
            </div>
            
            <div class="auth-footer">
                <button id="verificationLogoutBtn" class="btn-link">
                    Выйти и войти с другим аккаунтом
                </button>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
